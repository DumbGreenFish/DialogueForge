name: Build Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Prepare Android SDK stub
        run: |
          New-Item -ItemType Directory -Force -Path "$env:RUNNER_TEMP\android-stub\platforms\android-37"
          New-Item -ItemType File -Force -Path "$env:RUNNER_TEMP\android-stub\platforms\android-37\android.jar"
          "sdk.dir=$env:RUNNER_TEMP\android-stub" | Out-File -FilePath local.properties -Encoding ASCII

      - name: Build Windows distributions
        run: |
          ./gradlew.bat packageDistributionForCurrentOS

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: build/compose/binaries/main/
          retention-days: 1

      - name: Upload to release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            build/compose/binaries/main/msi/*.msi
            build/compose/binaries/main/exe/*.exe
          draft: true
          prerelease: true
          generate_release_notes: true

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Linux packaging tools
        run: sudo apt install -y rpm libfuse2

      - name: Prepare Android SDK stub
        run: |
          mkdir -p /tmp/android-stub/platforms/android-37
          touch /tmp/android-stub/platforms/android-37/android.jar
          echo "sdk.dir=/tmp/android-stub" > local.properties

      - name: Build Linux distributions
        run: |
          ./gradlew packageDeb packageRpm packageAppImage

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: build/compose/binaries/main/
          retention-days: 1

      - name: Upload to release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            build/compose/binaries/main/deb/*.deb
            build/compose/binaries/main/rpm/*.rpm
            build/compose/binaries/main/app/*.AppImage
          draft: true
          prerelease: true
          generate_release_notes: true

  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Prepare Android SDK stub
        run: |
          mkdir -p /tmp/android-stub/platforms/android-37
          touch /tmp/android-stub/platforms/android-37/android.jar
          echo "sdk.dir=/tmp/android-stub" > local.properties

      - name: Build Web (WASM)
        run: |
          ./gradlew wasmJsBrowserProductionWebpack

      - name: Package web as ZIP
        run: (cd build/dist/wasmJs/productionExecutable && zip -r ../../web-dist.zip .)

      - name: Upload Web artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-artifacts
          path: build/dist/web-dist.zip
          retention-days: 1

      - name: Upload to release
        uses: softprops/action-gh-release@v3
        with:
          files: build/dist/web-dist.zip
          draft: true
          prerelease: true
          generate_release_notes: true

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > keystore.jks

      - name: Create keystore.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cat > keystore.properties << EOF
          storeFile=$(pwd)/keystore.jks
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      - name: Build Android AAB (App Bundle)
        run: |
          ./gradlew bundleRelease

      - name: Build Android APK
        run: |
          ./gradlew assembleRelease

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-artifacts
          path: |
            build/outputs/bundle/release/
            build/outputs/apk/release/
          retention-days: 1

      - name: Upload to release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            build/outputs/bundle/release/*.aab
            build/outputs/apk/release/*.apk
          draft: true
          prerelease: true
          generate_release_notes: true



