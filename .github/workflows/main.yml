name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Prepare Android SDK stub
        run: |
          New-Item -ItemType Directory -Force -Path "$env:RUNNER_TEMP\android-stub\platforms\android-37"
          New-Item -ItemType File -Force -Path "$env:RUNNER_TEMP\android-stub\platforms\android-37\android.jar"
          "sdk.dir=$env:RUNNER_TEMP\android-stub" | Out-File -FilePath local.properties -Encoding ASCII

      - name: Build Windows distributions
        run: |
          ./gradlew.bat packageDistributionForCurrentOS

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: build/compose/binaries/main/
          retention-days: 1

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Linux packaging tools
        run: sudo apt install -y rpm libfuse2

      - name: Prepare Android SDK stub
        run: |
          mkdir -p /tmp/android-stub/platforms/android-37
          touch /tmp/android-stub/platforms/android-37/android.jar
          echo "sdk.dir=/tmp/android-stub" > local.properties

      - name: Build Linux distributions
        run: |
          ./gradlew packageDeb packageRpm packageAppImage

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: build/compose/binaries/main/
          retention-days: 1

  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Prepare Android SDK stub
        run: |
          mkdir -p /tmp/android-stub/platforms/android-37
          touch /tmp/android-stub/platforms/android-37/android.jar
          echo "sdk.dir=/tmp/android-stub" > local.properties

      - name: Build Web (WASM)
        run: |
          ./gradlew wasmJsBrowserProductionWebpack

      - name: Upload Web artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-artifacts
          path: build/dist/wasmJs/productionExecutable/
          retention-days: 1

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > keystore.jks

      - name: Create keystore.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cat > keystore.properties << EOF
          storeFile=$(pwd)/keystore.jks
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      - name: Build Android AAB (App Bundle)
        run: |
          ./gradlew bundleRelease

      - name: Build Android APK
        run: |
          ./gradlew assembleRelease

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-artifacts
          path: |
            build/outputs/bundle/release/
            build/outputs/apk/release/
          retention-days: 1

  create-release:
    needs: [build-windows, build-linux, build-web, build-android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.ref }}"
          VERSION=${VERSION#refs/tags/}
          gh release create "$VERSION" \
            --title "Release $VERSION" \
            --draft \
            artifacts/**/*

      - name: List artifacts
        run: |
          find artifacts -type f | head -20
